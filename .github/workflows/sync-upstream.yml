name: Sync upstream

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch in this fork to receive upstream changes
        required: true
        default: master

permissions:
  contents: write

jobs:
  sync:
    name: Merge upstream into fork branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6.0.0
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate push token
        env:
          SYNC_UPSTREAM_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          if [ -z "$SYNC_UPSTREAM_TOKEN" ]; then
            echo "SYNC_UPSTREAM_TOKEN is required to push branch and tags that may reference workflow changes."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.SYNC_UPSTREAM_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Fetch upstream repository
        run: |
          if git remote get-url upstream; then
            git remote set-url upstream https://github.com/home-assistant/plugin-dns.git
          else
            git remote add upstream https://github.com/home-assistant/plugin-dns.git
          fi
          git fetch upstream --tags

      - name: Merge upstream master
        run: |
          git merge --no-ff -X ours upstream/master -m "Merge upstream/master into ${{ inputs.target_branch }}"

      - name: Push merged branch
        run: |
          git push origin HEAD:${{ inputs.target_branch }}

      - name: Push upstream tags
        run: |
          git push origin --tags
